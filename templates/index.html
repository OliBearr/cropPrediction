<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Prediction System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f9f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { max-width: 800px; margin-top: 50px; margin-bottom: 50px; }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }
        .card-header {
            background-color: #2E8B57; /* SeaGreen */
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
        .btn-predict {
            background-color: #2E8B57;
            color: white;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .btn-predict:hover { background-color: #246B43; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header text-center">
                <h2 class="mb-0">🌾 Intelligent Crop Recommendation</h2>
                <p class="mb-0 text-light mt-1">Enter soil and environment parameters to get a prediction</p>
            </div>
            <div class="card-body p-4">
                <form action="/predict" method="post">
                    <div class="row g-3">
                        <h5 class="text-success border-bottom pb-2">Soil Nutrients</h5>
                        <div class="col-md-4">
                            <label for="N" class="form-label">Nitrogen (N)</label>
                            <input type="number" step="any" min="0" class="form-control" id="N" name="N" placeholder="Ratio" required>
                        </div>
                        <div class="col-md-4">
                            <label for="P" class="form-label">Phosphorus (P)</label>
                            <input type="number" step="any" min="0" class="form-control" id="P" name="P" placeholder="Ratio" required>
                        </div>
                        <div class="col-md-4">
                            <label for="K" class="form-label">Potassium (K)</label>
                            <input type="number" step="any" min="0" class="form-control" id="K" name="K" placeholder="Ratio" required>
                        </div>

                        <h5 class="text-success border-bottom pb-2 mt-4">Environmental Factors</h5>
                        <div class="col-md-6">
                            <label for="temperature" class="form-label">Temperature (°C)</label>
                            <input type="number" step="any" class="form-control" id="temperature" name="temperature" placeholder="e.g., 25.5" required>
                        </div>
                        <div class="col-md-6">
                            <label for="humidity" class="form-label">Humidity (%)</label>
                            <input type="number" step="any" min="0" max="100" class="form-control" id="humidity" name="humidity" placeholder="e.g., 70" required>
                        </div>
                        <div class="col-md-6">
                            <label for="ph" class="form-label">Soil pH Level</label>
                            <input type="number" step="any" min="0" max="14" class="form-control" id="ph" name="ph" placeholder="0 to 14" required>
                        </div>
                        <div class="col-md-6">
                            <label for="rainfall" class="form-label">Rainfall (mm)</label>
                            <input type="number" step="any" min="0" class="form-control" id="rainfall" name="rainfall" placeholder="e.g., 200" required>
                        </div>
                    </div>
                    
                    <div class="text-center mt-5">
                        <button type="submit" class="btn btn-predict btn-lg w-50">Predict Crop</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
